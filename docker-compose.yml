services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: hitl_db
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: hitl_user
      MYSQL_PASSWORD: hitl_password
    ports:
      - "3306:3306"
    volumes:
      - ./docker_data/db:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://hitl_user:hitl_password@db:3306/hitl_db
      - OLLAMA_BASE=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/.venv
    # Enable hot-reloading
    command: [ "uv", "run", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload" ]
    restart: always

  frontend:
    build:
      context: ./frontend
      target: dev
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: always

  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"
